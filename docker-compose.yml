services:
  web:
    build:
      context: ./app
      dockerfile: Dockerfile

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/todos
      SECRET_KEY: not-so-secret

    depends_on:
      - db

  db:
    image: postgres:15

    environment:
      POSTGRES_DB: todos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  postgres_data:
